<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Advisor | Enterprise Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #030712);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f3f4f6;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent);
        }

        .chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-msg {
            background: rgba(255, 255, 255, 0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-msg {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .footer {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .mic-outer {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mic-inner {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .mic-outer.active {
            background: rgba(239, 68, 68, 0.1);
        }

        .mic-outer.active .mic-inner {
            background: #ef4444;
            transform: scale(0.9);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }

        .hint {
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Advisor Bot</h1>
        <div class="hint"><span class="status-dot"></span>System Operational</div>
    </div>

    <div class="chat-window" id="chat">
        <div class="msg bot-msg">Welcome. Tap the mic and speak naturally to schedule your appointment.</div>
    </div>

    <div class="footer">
        <!-- HYBRID INPUT (TYPE TO CHAT) -->
        <div class="input-container" style="display: flex; width: 100%; gap: 10px; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);">
            <input type="text" id="text-input" placeholder="Type or use the mic..." style="flex: 1; padding: 12px 20px; border-radius: 30px; border: none; background: transparent; color: white; outline: none; font-family: inherit;">
            <button id="send-btn" style="background: var(--primary); border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; color: white; font-weight: 600; transition: 0.3s; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);">Send</button>
        </div>

        <div class="mic-outer" id="mic-trigger">
            <div class="mic-inner">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
        </div>
        <div class="hint" id="status-text">Tap to speak</div>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chat');
    const micBtn = document.getElementById('mic-trigger');
    const status = document.getElementById('status-text');
    const textInput = document.getElementById('text-input');
    const sendBtn = document.getElementById('send-btn');
    const sid = 'sid_' + Math.random().toString(36).substr(2, 9);

    // --- PREMIUM VOICE OPTION (ElevenLabs) ---
    // Change useElevenLabs to true and add your API key to hear a real human!
    const useElevenLabs = false; // Toggle to true to use professional AI voices
    const ELEVEN_LABS_KEY = ""; // IMPORTANT: Set your key here or via a secure backend proxy
    let activeVoiceId = null;
    let activeVoiceName = null;

    async function speak(text) {
        if (useElevenLabs && ELEVEN_LABS_KEY) {
            try {
                // 1. Fetch voices if we haven't yet
                if (!activeVoiceId) {
                    status.innerText = "Connecting to ElevenLabs...";
                    const voicesRes = await fetch("https://api.elevenlabs.io/v1/voices", {
                        headers: { 'xi-api-key': ELEVEN_LABS_KEY }
                    });

                    if (!voicesRes.ok) {
                        const errTxt = await voicesRes.text();
                        throw new Error(`API Error ${voicesRes.status}: ${errTxt}`);
                    }

                    const voicesData = await voicesRes.json();
                    
                    if (voicesData.voices && voicesData.voices.length > 0) {
                        // SEARCH FOR FREE-TIER SAFE VOICES
                        const freeVoice = voicesData.voices.find(v => v.name.includes("Rachel") || v.name.includes("Adam") || v.name.includes("Bella"));
                        if (freeVoice) {
                            activeVoiceId = freeVoice.voice_id;
                            activeVoiceName = freeVoice.name;
                        } else {
                            activeVoiceId = voicesData.voices[0].voice_id;
                            activeVoiceName = voicesData.voices[0].name;
                        }
                        console.log("Using Free-Safe Voice:", activeVoiceName);
                    } else {
                        throw new Error("Library reported as empty. Please verify your Voice Lab!");
                    }
                }

                status.innerText = `Speaking with ${activeVoiceName}...`;
                // 2. Synthesize
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${activeVoiceId}`, {
                    method: 'POST',
                    headers: { 'xi-api-key': ELEVEN_LABS_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: text, 
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                    })
                });

                if (!response.ok) {
                    const errorDetails = await response.json();
                    throw new Error(errorDetails.detail.message || "ElevenLabs Server Refused Request");
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.play();
                status.innerText = "Ready";
            } catch (err) {
                console.error("Voice Error:", err);
                status.innerText = "Voice Error: " + err.message;
                
                // FALLBACK TO BROWSER VOICE IF PREMIUM FAILS
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            }
        } else {
            // Free Browser Voice
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }
    }

    // Handle Typing Input
    sendBtn.onclick = () => {
        const text = textInput.value.trim();
        if (text) {
            addMsg(text, 'user-msg');
            fetchBot(text);
            textInput.value = '';
        }
    };

    textInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.click(); };

    // 2. Speech-to-Text (The Ears)
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Recognition) {
        status.innerText = "Error: Browser doesn't support Voice";
    } else {
        const recognition = new Recognition();
        recognition.continuous = true; // KEEP LISTENING!
        recognition.interimResults = true; // SHOW WORDS AS I SPEAK!

        let finalTranscript = '';
        let silenceTimer;

        micBtn.onclick = () => {
            if (micBtn.classList.contains('active')) {
                stopRecognition();
            } else {
                startRecognition();
            }
        };

        function startRecognition() {
            finalTranscript = '';
            recognition.start();
            micBtn.classList.add('active');
            status.innerText = "Listening... (Please Speak)";
        }

        function stopRecognition() {
            recognition.stop();
            micBtn.classList.remove('active');
            if (finalTranscript.trim()) {
                addMsg(finalTranscript, 'user-msg');
                fetchBot(finalTranscript);
                finalTranscript = '';
            }
        }

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            status.innerText = "Heard: " + (finalTranscript + interimTranscript);

            // AUTO-STOP after 2 seconds of silence
            clearTimeout(silenceTimer);
            silenceTimer = setTimeout(() => {
                stopRecognition();
            }, 2000); 
        };

        recognition.onerror = (e) => {
            console.error(e);
            stopRecognition();
            status.innerText = "Error: " + e.error;
        };
    }

    function addMsg(text, cls) {
        const d = document.createElement('div');
        d.className = `msg ${cls}`;
        d.innerText = text;
        chatArea.appendChild(d);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function fetchBot(text) {
        status.innerText = "Analyzing...";
        try {
            const r = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, session_id: sid})
            });
            const data = await r.json();
            addMsg(data.response, 'bot-msg');
            speak(data.response);
        } catch (err) {
            status.innerText = "Connection lost";
        }
    }
</script>

</body>
</html>
